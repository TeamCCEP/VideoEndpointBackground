<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cisco Video Loop</title>
    <style>
        /* Remove default margins and ensure the body takes up full height */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Hides scrollbars */
            background-color: #000;
            /* Black background fallback */
        }

        /* Style the video to cover the entire screen */
        #fullscreen-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Ensures the video covers the area without distortion */
            z-index: -1;
            /* Places video behind any other content */
        }
    </style>
</head>

<body>

    <video id="fullscreen-video" autoplay loop muted playsinline>
        <source src="https://teamccep.github.io/VideoEndpointBackground/Cisco_Idle_Video_Demo_Generation.mp4"
            type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>

</html>
