<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Troubleshooting</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #fullscreen-video {
            /* Changed to max-width/height to ensure controls are visible for debugging */
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body>

    <!-- Added 'controls' so you can manually hit play if autoplay fails -->
    <video id="fullscreen-video" autoplay loop muted playsinline controls>
        <source src="https://teamccep.github.io/VideoEndpointBackground/Cisco_Idle_Video_Demo_Generation.mp4"
            type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        const video = document.getElementById('fullscreen-video');

        // Listen for errors
        video.addEventListener('error', function (e) {
            alert("Error loading video: The URL might be broken or blocked. Please check the link.");
            console.error("Video Error:", video.error);
        }, true);

        // Check if the source is valid
        const source = video.querySelector('source');
        source.addEventListener('error', function (e) {
            alert("Error: The video source file could not be found (404) or access is denied.");
        });
    </script>

</body>

</html>
